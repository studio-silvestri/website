<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danke – Studio Silvestri</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F9F9F9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      max-width: 520px;
      width: 100%;
      padding: 56px 40px;
      text-align: center;
    }
    .checkmark {
      width: 64px;
      height: 64px;
      background: #f0faf5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 28px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }
    p {
      color: #666;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .back-link {
      display: inline-block;
      margin-top: 32px;
      background: #5C2E3E;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .back-link:hover { background: #4a2433; }
    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #999;
      margin-top: 40px;
      text-transform: uppercase;
    }
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark">✓</div>
    <h1>Danke für deine Anfrage!</h1>
    <p>Wir haben deine Nachricht erhalten und melden uns innerhalb von 24 Stunden bei dir.</p>
    <p>Du hast ausserdem eine Bestätigung per E-Mail erhalten.</p>
    <a href="/" class="back-link">← Zurück zur Startseite</a>
    <p class="logo">STUDIO SILVESTRI</p>
  </div>
</body>
</html>
